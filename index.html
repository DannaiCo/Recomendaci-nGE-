<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Rotación</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  font-family: Arial, sans-serif;
}

.test{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) rotate(90deg);
  font-size:120px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="test">
TEST
</div>

</body>
</html>
