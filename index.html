<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Día de la mujer</title>
    <link rel="stylesheet" href="https://use.typekit.net/ymy7tce.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: "kit-rounded", sans-serif;
        font-style: normal;
      }

      .contenedor {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video#fondoVideo {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }
      .contenedorTexto {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        inset: 0;
        z-index: 2;
      }
      .nombre {
        position: absolute;
        top: 400px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 70px;
        color: #ffe4f3;
        text-transform: uppercase;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .mensaje {
        position: absolute;
        top: 594px;
        left: 50%;
        transform: translateX(-50%);
        width: 1600px;
        height: 124px;
        text-align: center;
        font-size: 70px;
        font-weight: 800;
        color: #453188;
        line-height: 1.2;
        text-transform: uppercase;
        word-wrap: break-word;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .mostrar {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <video autoplay muted loop playsinline id="fondoVideo">
        <source src="fondo.mp4" type="video/mp4" />
        Cargando.
      </video>

      <div class="contenedorTexto">
        <div class="nombre" id="nombre"></div>
        <div class="mensaje" id="mensaje"></div>
      </div>
    </div>

    <script>
      const url =
        "https://script.google.com/macros/s/AKfycbxv8-cGlMdG3ilb60hxcWzi7nuaBXimpkNKYdRBuhbWpZ8jXWICX6zCNtmWHLATn-vQDA/exec";

      fetch(url)
        .then((res) => res.json())
        .then((data) => {
          const mensajes = data;

          const nombreEl = document.getElementById("nombre");
          const mensajeEl = document.getElementById("mensaje");

          function mostrarMensaje() {
            const aleatorio = mensajes[Math.floor(Math.random() * mensajes.length)];

            nombreEl.innerText = aleatorio.nombre;
            mensajeEl.innerText = aleatorio.mensaje;

            nombreEl.classList.add("mostrar");
            mensajeEl.classList.add("mostrar");
          }

          mostrarMensaje();

          setInterval(() => {
            nombreEl.classList.remove("mostrar");
            mensajeEl.classList.remove("mostrar");

            setTimeout(mostrarMensaje, 500);
          }, 5000);
        })
        .catch((err) => {
          console.error("Error cargando datos:", err);
        });
    </script>
  </body>
</html>
