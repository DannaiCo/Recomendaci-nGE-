<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día del Podcast</title>

<link href="https://use.typekit.net/ymy7tce.css">

<style>

html, body{
margin:0;
padding:0;
overflow:hidden;
width:100vw;
height:100vh;
font-family:"kit-rounded", sans-serif;
}

.contenedor{
position:relative;
width:100vw;
height:100vh;
}

video#fondoVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:fill;
z-index:0;
}

/* NOMBRE */

.nombre{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%, -50%);
font-size:120px;
font-weight:800;
color:#ffe4f3;
font-family:"kit-rounded", sans-serif;
text-transform:uppercase;
opacity:0;
transition:opacity 0.3s ease-in-out;
text-transform:uppercase;  /* 👈 convierte todo a MAYÚSCULA */
}

/* MENSAJE */

.mensaje{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%, -50%);

width:2000px;
max-width:2000px;

text-align:center;
font-size:150px;
font-weight:800;
color:#453188;

font-family:"kit-rounded", sans-serif;

white-space:normal;
word-wrap:break-word;
overflow-wrap:break-word;

line-height:1.2;
text-transform:uppercase;

opacity:0;
transition:opacity 0.1s ease-in-out;
}

.mostrar{
opacity:1;
}

</style>
</head>

<body>

<div class="contenedor">

<video autoplay muted loop playsinline id="fondoVideo">
<source src="fondo.mp4" type="video/mp4">
</video>

<div class="nombre" id="nombre"></div>
<div class="mensaje" id="mensaje"></div>

</div>

<script>

const url = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrSDIzN7xnrtXit0zWZy8nrW_OQ0Y6FQKNTPEaY0wbzZWUOCnIzflhJ03E_FyJQUw903kkX11omc4b2u2OreK_FcA5ozZK4xkTolSvusmyFDgpPFD2Ylqq9wmIqU6QA9x9E9_tyybcfkBmu0kFc8wzBBizKmnrQ9dtXfRigPGXx2-5xslxfCXSFS_qPQS3wFvCXmaDGDV63e8p0ciMe3fTZsPNc8m9UzPlHiAIE3ueVnmEOOWSDpO2wZpZEERVfnNZPPs955RJvuZDjF5mkDmEOPzHN2T_CtPDvqBchE&lib=M7mryI_rJU1CO8-B158svx6eEHa1C_Htb";

fetch(url)
.then(res => res.json())
.then(data => {

const mensajes = data;

const nombreEl = document.getElementById("nombre");
const mensajeEl = document.getElementById("mensaje");

function mostrarMensaje(){

const aleatorio = mensajes[Math.floor(Math.random() * mensajes.length)];

nombreEl.innerText = aleatorio.nombre;
mensajeEl.innerText = aleatorio.mensaje;

nombreEl.classList.add("mostrar");
mensajeEl.classList.add("mostrar");

}

mostrarMensaje();

setInterval(()=>{

nombreEl.classList.remove("mostrar");
mensajeEl.classList.remove("mostrar");

setTimeout(mostrarMensaje,500);

},5000);

})
.catch(err=>{
console.error("Error cargando datos:",err);
});

</script>

</body>
</html>
