<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Día de la mujer</title>

    <link rel="stylesheet" href="https://use.typekit.net/ymy7tce.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
        font-family: "kit-rounded", sans-serif;
      }

      /* Escenario base */
      .escenario {
        position: absolute;
        width: 3840px;
        height: 1080px;
        transform-origin: top left;
      }

      .contenedor {
        position: relative;
        width: 100%;
        height: 100%;
      }

      video#fondoVideo {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .contenedorTexto {
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      .nombre {
        position: absolute;
        top: 46.5%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: #ffe4f3;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }

      .mensaje {
        position: absolute;
        top: 66%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        text-align: center;
        font-size: 45px;
        font-weight: 800;
        color: #453188;
        line-height: 1.2;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }

      .mostrar {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="escenario" id="escenario">
      <div class="contenedor">
        <video autoplay muted loop playsinline id="fondoVideo">
          <source src="fondo.mp4" type="video/mp4" />
        </video>

        <div class="contenedorTexto">
          <div class="nombre" id="nombre"></div>
          <div class="mensaje" id="mensaje"></div>
        </div>
      </div>
    </div>

    <script>
      const escenario = document.getElementById("escenario");

      function escalarContenido() {
        const scaleX = window.innerWidth / 3840;
        const scaleY = window.innerHeight / 1080;

        const scale = Math.min(scaleX, scaleY);

        escenario.style.transform = `scale(${scale})`;
      }

      window.addEventListener("resize", escalarContenido);
      escalarContenido();

      const url =
        "https://script.google.com/macros/s/AKfycbxv8-cGlMdG3ilb60hxcWzi7nuaBXimpkNKYdRBuhbWpZ8jXWICX6zCNtmWHLATn-vQDA/exec";

      fetch(url)
        .then((res) => res.json())
        .then((data) => {
          const mensajes = data;

          const nombreEl = document.getElementById("nombre");
          const mensajeEl = document.getElementById("mensaje");

          function mostrarMensaje() {
            const aleatorio = mensajes[Math.floor(Math.random() * mensajes.length)];

            nombreEl.innerText = aleatorio.nombre;
            mensajeEl.innerText = aleatorio.mensaje;

            nombreEl.classList.add("mostrar");
            mensajeEl.classList.add("mostrar");
          }

          mostrarMensaje();

          setInterval(() => {
            nombreEl.classList.remove("mostrar");
            mensajeEl.classList.remove("mostrar");

            setTimeout(mostrarMensaje, 500);
          }, 5000);
        })
        .catch((err) => {
          console.error("Error cargando datos:", err);
        });
    </script>
  </body>
</html>
