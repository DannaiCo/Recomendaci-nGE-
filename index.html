<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día de la mujer</title>

<link rel="stylesheet" href="https://use.typekit.net/ymy7tce.css">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
width:100vw;
height:100vh;
font-family:"kit-rounded", sans-serif;
}

.contenedor{
position:relative;
width:100vw;
height:100vh;
}

/* VIDEO */

video#fondoVideo{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* ZONA SEGURA */

.zonaSegura{

position:absolute;

width:1080px;
height:1080px;

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:2;

}

/* NOMBRE */

.nombre{

position:absolute;

top:350px;
left:50%;

transform:translateX(-50%);

font-size:70px;

color:#ffe4f3;

text-transform:uppercase;

text-align:center;

opacity:0;

transition:opacity .3s;

}

/* MENSAJE */

.mensaje{

position:absolute;

top:520px;
left:50%;

transform:translateX(-50%);

width:700px;

text-align:center;

font-size:75px;

font-weight:800;

color:#453188;

line-height:1.2;

text-transform:uppercase;

word-wrap:break-word;

opacity:0;

transition:opacity .3s;

}

.mostrar{
opacity:1;
}

</style>
</head>

<body>

<div class="contenedor">

<video autoplay muted loop playsinline id="fondoVideo">
<source src="fondo.mp4" type="video/mp4">
</video>

<div class="zonaSegura">

<div class="nombre" id="nombre"></div>

<div class="mensaje" id="mensaje"></div>

</div>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbxv8-cGlMdG3ilb60hxcWzi7nuaBXimpkNKYdRBuhbWpZ8jXWICX6zCNtmWHLATn-vQDA/exec";

fetch(url)
.then(res=>res.json())
.then(data=>{

const mensajes=data;

const nombreEl=document.getElementById("nombre");
const mensajeEl=document.getElementById("mensaje");

function mostrarMensaje(){

const aleatorio=mensajes[Math.floor(Math.random()*mensajes.length)];

nombreEl.innerText=aleatorio.nombre;
mensajeEl.innerText=aleatorio.mensaje;

nombreEl.classList.add("mostrar");
mensajeEl.classList.add("mostrar");

}

mostrarMensaje();

setInterval(()=>{

nombreEl.classList.remove("mostrar");
mensajeEl.classList.remove("mostrar");

setTimeout(mostrarMensaje,500);

},5000);

})
.catch(err=>console.error(err));

</script>

</body>
</html>
